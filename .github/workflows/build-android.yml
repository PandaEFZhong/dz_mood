name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          NEXT_PUBLIC_MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify env vars injected into build
        run: |
          if [ -z "${{ secrets.MOONSHOT_API_KEY }}" ]; then
            echo "❌ MOONSHOT_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "❌ NEXT_PUBLIC_SUPABASE_URL secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY secret is missing"
            exit 1
          fi
          if ! grep -q "supabase.co" dist/_next/static/chunks/app/page-*.js; then
            echo "❌ Supabase URL not found in built bundle"
            exit 1
          fi
          echo "✅ Build bundle contains Supabase URL"
          echo "MOONSHOT_API_KEY length: ${#MOONSHOT_API_KEY}"
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Check keystore secret
        id: keystore_check
        if: github.event.inputs.build_type != 'debug'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi

      - name: Load keystore from secret
        if: github.event.inputs.build_type != 'debug' && steps.keystore_check.outputs.has_secret == 'true'
        run: |
          cd android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > hearttrace.keystore
          echo "Keystore loaded from GitHub Secret"

      - name: Generate release keystore
        if: github.event.inputs.build_type != 'debug' && steps.keystore_check.outputs.has_secret == 'false'
        run: |
          cd android/app
          keytool -genkey -v -keystore hearttrace.keystore -alias hearttrace -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Derrick Zhong, OU=HeartTrace, O=HeartTrace, L=Beijing, ST=Beijing, C=CN" -storepass hearttrace2024 -keypass hearttrace2024
          echo "New keystore generated - download it from artifacts and set as KEYSTORE_BASE64 secret"

      - name: Upload keystore (for initial setup)
        if: github.event.inputs.build_type != 'debug' && steps.keystore_check.outputs.has_secret == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: hearttrace-keystore
          path: android/app/hearttrace.keystore

      - name: Build Release APK
        if: github.event.inputs.build_type != 'debug'
        env:
          KEYSTORE_PATH: hearttrace.keystore
          KEYSTORE_PASSWORD: hearttrace2024
          KEY_ALIAS: hearttrace
          KEY_PASSWORD: hearttrace2024
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Release APK
        if: github.event.inputs.build_type != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: hearttrace-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: hearttrace-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
